# DeepGuard Configuration File
# Customize agent behavior and RAI settings

[system]
version = 1.0.0
environment = development
log_level = INFO

[api]
host = 0.0.0.0
port = 8000
max_upload_size_mb = 100
allowed_origins = *

[agents]
# Orchestrator Agent
orchestrator_enabled = true
orchestrator_timeout = 30

# Visual Forensics Agent
visual_forensics_enabled = true
visual_forensics_confidence_threshold = 0.7
visual_forensics_timeout = 120
visual_forensics_gpu = true
visual_forensics_model = efficientnet_b4

# Audio Analysis Agent
audio_analysis_enabled = true
audio_analysis_confidence_threshold = 0.7
audio_analysis_timeout = 90

# Provenance Verification Agent
provenance_enabled = true
provenance_confidence_threshold = 0.6
provenance_timeout = 60

# Bias Auditor Agent
bias_auditor_enabled = true
bias_auditor_confidence_threshold = 0.9
bias_auditor_timeout = 45
bias_auditor_demographic_groups = lighter_skin,darker_skin,male,female,age_18_30,age_30_50,age_50_plus

# Explainability Agent
explainability_enabled = true
explainability_confidence_threshold = 0.85
explainability_timeout = 60
explainability_methods = grad_cam,shap

# Governance & Compliance Agent
governance_enabled = true
governance_confidence_threshold = 0.95
governance_timeout = 30

# Report Generation Agent
report_enabled = true
report_timeout = 45

[rai_principles]
# Fairness
fairness_enabled = true
fairness_max_fpr_disparity = 0.10
fairness_max_fnr_disparity = 0.10

# Accountability
accountability_enabled = true
accountability_audit_logs = true
accountability_immutable_logs = true

# Transparency
transparency_enabled = true
transparency_xai_required = true
transparency_natural_language_explanations = true

# Privacy
privacy_enabled = true
privacy_gdpr_compliant = true
privacy_data_minimization = true
privacy_anonymization = true

# Robustness
robustness_enabled = true
robustness_adversarial_testing = true
robustness_confidence_gating = true

# Non-Maleficence
non_maleficence_enabled = true
non_maleficence_human_review_threshold = 0.85
non_maleficence_high_stakes_review = true

[human_review]
# Automatic escalation thresholds
high_confidence_deepfake_threshold = 0.85
ambiguous_range_low = 0.40
ambiguous_range_high = 0.60
fairness_violation_escalate = true
governance_alert_severity_escalate = high,critical

[datasets]
# Training datasets (paths to be configured)
faceforensics_path = /data/faceforensics++
dfdc_path = /data/dfdc
dgm4_path = /data/dgm4

[output]
# Output paths
reports_dir = /home/claude/deepguard/outputs/reports
visualizations_dir = /home/claude/deepguard/outputs/visualizations
audit_logs_dir = /home/claude/deepguard/logs

[security]
# Security settings
max_file_size_mb = 100
allowed_image_types = jpg,jpeg,png,bmp,webp
allowed_video_types = mp4,avi,mov,mkv,webm
allowed_audio_types = mp3,wav,ogg,m4a
scan_uploads = true
